name: Build and Release Flutter Multi-Platform App

on:
  push:
    branches:
      - main
    paths:
      - 'pubspec.yaml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ubuntu:
    name: Build Android, Web, Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev mpv libmpv-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Extract Version from pubspec.yaml
        id: pubspec-version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d '[:space:]')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Web App
        run: flutter build web --release

      - name: Build Linux Desktop App
        run: flutter build linux --release

      - name: Compress Linux Bundle
        run: |
          cd build/linux/x64/release/
          tar -czf ../../../../netr-linux-x64.tar.gz bundle/
          cd ../../../..

      - name: Pack Web Build
        run: |
          cd build
          zip -r ../netr-web.zip web/
          cd ..

      - name: Upload Raw Linux Bundle for Packaging
        uses: actions/upload-artifact@v4
        with:
          name: raw-linux-bundle
          path: build/linux/x64/release/bundle/

      - name: Upload Main Base Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: base-linux-and-mobile-artifacts
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            netr-web.zip
            netr-linux-x64.tar.gz

  build-arch:
    name: Build Arch Linux Pacman Package
    needs: build-ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get version from pubspec.yaml
        id: pubspec-version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d '[:space:]')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Raw Linux Bundle
        uses: actions/download-artifact@v4
        with:
          name: raw-linux-bundle
          path: build/linux/x64/release/bundle/

      - name: Generate Arch Linux PKGBUILD
        run: |
          VERSION="${{ steps.pubspec-version.outputs.VERSION }}"
          cat <<EOF > PKGBUILD
          pkgname=netr
          pkgver=${VERSION} # Clean semantic version string (e.g., 1.0.0)
          pkgrel=1
          pkgdesc="CCTV camera monitor supporting intranet and remote SSH connections"
          arch=('x86_64')
          url="https://github.com"
          license=('GPL-3.0-only')
          depends=('gtk3' 'liblzma' 'mpv')
          source=()
          
          package() {
            install -dm755 "\${pkgdir}/opt/netr"
            cp -r "${GITHUB_WORKSPACE}/build/linux/x64/release/bundle/." "\${pkgdir}/opt/netr/"
            
            install -dm755 "\${pkgdir}/usr/bin"
            ln -s "/opt/netr/netr" "\${pkgdir}/usr/bin/netr"

            install -dm755 "\${pkgdir}/usr/share/applications"
            install -m644 "${GITHUB_WORKSPACE}/linux/netr.desktop" "\${pkgdir}/usr/share/applications/netr.desktop"

            install -dm755 "\${pkgdir}/usr/share/pixmaps"
            install -m644 "${GITHUB_WORKSPACE}/icons/netr.png" "\${pkgdir}/usr/share/pixmaps/netr.png"

            install -dm755 "\${pkgdir}/usr/share/licenses/\${pkgname}"
            install -m644 "${GITHUB_WORKSPACE}/LICENSE" "\${pkgdir}/usr/share/licenses/\${pkgname}/LICENSE"
          }
          EOF

      - name: Compile Package inside Arch Linux Container
        run: |
          docker run --privileged -v ${{ github.workspace }}:${{ github.workspace }} -w ${{ github.workspace }} archlinux:latest bash -c "
            pacman -Syu --noconfirm --needed base-devel binutils
            useradd -m builder && echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
            chown -R builder:builder ${{ github.workspace }}
            su builder -c 'makepkg -s --noconfirm'
          "

      - name: Prepare Arch Package
        run: |
          mv *.pkg.tar.zst netr-linux-x64.pkg.tar.zst

      - name: Upload Arch Artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-artifact
          path: netr-linux-x64.pkg.tar.zst

  build-windows:
    name: Build Windows Desktop
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows Desktop App
        run: flutter build windows --release

      - name: Compress Windows Bundle
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath netr-windows-x64.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: netr-windows-x64.zip

