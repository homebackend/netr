name: Build and Release Flutter Multi-Platform App

on:
  push:
    branches:
      - main
    paths:
      - 'pubspec.yaml'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apps:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    outputs:
      app_version: ${{ steps.version-collector.outputs.VERSION }}
    strategy:
      fail-fast: false
      matrix:
        target: [apk, web, linux, windows]
        include:
          - target: apk
            os: ubuntu-latest
          - target: web
            os: ubuntu-latest
          - target: linux
            os: ubuntu-latest
          - target: windows
            os: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK (Android Only)
        if: matrix.target == 'apk'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Linux Build Dependencies (Linux Only)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev mpv libmpv-dev

      - name: Set up Flutter Engine
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Extract Version from pubspec.yaml
        id: version-collector
        if: matrix.target == 'linux'
        shell: bash
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d '[:space:]')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Flutter Target (${{ matrix.target }})
        shell: bash
        run: |
          flutter build ${{ matrix.target }} --release \
            --dart-define=GH_OWNER=$GITHUB_REPOSITORY_OWNER \
            --dart-define=GH_REPO=${GITHUB_REPOSITORY#*/}

      - name: Package Linux Target
        if: matrix.target == 'linux'
        run: |
          cd build/linux/x64/release/
          tar -czf ../../../../netr-linux-x64.tar.gz bundle/

      - name: Package Web Target
        if: matrix.target == 'web'
        run: |
          cd build
          zip -r ../netr-web.zip web/

      - name: Package Windows Target
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath netr-windows-x64.zip

      - name: Upload Raw Linux Bundle for Arch Packaging
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: raw-linux-bundle
          path: build/linux/x64/release/bundle/

      - name: Upload Finished Production Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: base-${{ matrix.target }}-artifacts
          path: |
            ${{ matrix.target == 'apk' && 'build/app/outputs/flutter-apk/app-release.apk' || '' }}
            ${{ matrix.target == 'web' && 'netr-web.zip' || '' }}
            ${{ matrix.target == 'linux' && 'netr-linux-x64.tar.gz' || '' }}
            ${{ matrix.target == 'windows' && 'netr-windows-x64.zip' || '' }}

  build-linux-packages:
    name: Build Downstream Package (${{ matrix.target }})
    needs: build-apps
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [arch]
        include:
          - target: arch
            container_image: 'archlinux:latest'
    container:
      image: ${{ matrix.container_image }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Raw Linux Bundle
        uses: actions/download-artifact@v4
        with:
          name: raw-linux-bundle
          path: build/linux/x64/release/bundle/

      - name: Generate Arch Linux PKGBUILD
        if: matrix.target == 'arch'
        run: |
          VERSION="${{ needs.build-apps.outputs.app_version }}"
          cat <<EOF > PKGBUILD
          pkgname=netr
          pkgver=${VERSION}
          pkgrel=1
          pkgdesc="CCTV camera monitor supporting intranet and remote SSH connections"
          arch=('x86_64')
          url="https://github.com"
          license=('GPL-3.0-only')
          depends=('gtk3' 'xz' 'mpv')
          source=()
          
          package() {
            install -dm755 "\${pkgdir}/opt/netr"
            chmod +x "${GITHUB_WORKSPACE}/build/linux/x64/release/bundle/netr"
            chmod +x "${GITHUB_WORKSPACE}/build/linux/x64/release/bundle/lib/libflutter_linux_gtk.so"
            cp -r "${GITHUB_WORKSPACE}/build/linux/x64/release/bundle/." "\${pkgdir}/opt/netr/"
            install -dm755 "\${pkgdir}/usr/bin"
            ln -s "/opt/netr/netr" "\${pkgdir}/usr/bin/netr"
            install -dm755 "\${pkgdir}/usr/share/applications"
            install -m644 "${GITHUB_WORKSPACE}/linux/netr.desktop" "\${pkgdir}/usr/share/applications/netr.desktop"
            install -dm755 "\${pkgdir}/usr/share/pixmaps"
            install -m644 "${GITHUB_WORKSPACE}/icons/netr.png" "\${pkgdir}/usr/share/pixmaps/netr.png"
            install -dm755 "\${pkgdir}/usr/share/licenses/\${pkgname}"
            install -m644 "${GITHUB_WORKSPACE}/LICENSE" "\${pkgdir}/usr/share/licenses/\${pkgname}/LICENSE"
          }
          EOF

      - name: Setup Compiler Dependencies
        if: matrix.target == 'arch'
        run: |
          pacman -Sy --noconfirm
          pacman -S --noconfirm --needed base-devel binutils sudo
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder $GITHUB_WORKSPACE

      - name: Compile Package
        if: matrix.target == 'arch'
        run: |
          su builder -c "makepkg -s --noconfirm"

      - name: Prepare Arch Package
        if: matrix.target == 'arch'
        run: |
          mv netr-${{ needs.build-apps.outputs.app_version }}-1-x86_64.pkg.tar.zst netr-linux-x64.pkg.tar.zst

      - name: Upload Arch Artifact
        uses: actions/upload-artifact@v4
        with:
          name: base-${{ matrix.target }}-artifacts
          path: netr-linux-x64.pkg.tar.zst

  create-release:
    name: Publish Production GitHub Release
    if: github.event_name != 'pull_request'
    needs: [build-apps, build-linux-packages]
    runs-on: ubuntu-latest
    steps:
      - name: Verify Tag Status
        id: tag-check
        run: |
          TAG_NAME="v${{ needs.build-apps.outputs.app_version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG_NAME}$"; then
            echo "TAG_EXISTS=true" >> $GITHUB_OUTPUT
            echo "Release for $TAG_NAME already exists. Halting execution gracefully."
          else
            echo "TAG_EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Guard Against Duplicate Builds
        if: steps.tag-check.outputs.TAG_EXISTS == 'true'
        run: |
          echo "Version v${{ needs.build-apps.outputs.app_version }} already published. Exiting cleanly."
          exit 0

      - name: Create and Push Secure Git Tag via REST API
        run: |
          TAG_NAME="v${{ needs.build-apps.outputs.app_version }}"
          
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://github.com{{ github.repository }}/git/refs \
            -d "{\"ref\": \"refs/tags/$TAG_NAME\", \"sha\": \"${{ github.sha }}\"}"

      - name: Download All Production Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Organize Files for Upload
        run: |
          mkdir -p ./release-assets
          find ./artifacts -name "app-release.apk" -exec cp {} ./release-assets/netr-android.apk \;
          find ./artifacts -name "netr-web.zip" -exec cp {} ./release-assets/ \;
          find ./artifacts -name "netr-linux-x64.tar.gz" -exec cp {} ./release-assets/ \;
          find ./artifacts -name "netr-linux-x64.pkg.tar.zst" -exec cp {} ./release-assets/ \;
          find ./artifacts -name "netr-windows-x64.zip" -exec cp {} ./release-assets/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-apps.outputs.app_version }}
          name: Release v${{ needs.build-apps.outputs.app_version }}
          draft: false
          prerelease: false
          files: ./release-assets/*
