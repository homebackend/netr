name: Build Netr - A Flutter Multi-Platform App

on:
  push:
    branches:
      - main
    paths:
      - 'pubspec.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'pubspec.yaml'
  workflow_dispatch:

jobs:
  build-ubuntu:
    name: Build Android, Web & Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Web App
        run: flutter build web --release

      - name: Build Linux Desktop App
        run: flutter build linux --release

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: netr-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: netr-web-bundle
          path: build/web/

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: netr-linux-app
          path: build/linux/x64/release/bundle/

  build-windows:
    name: Build Windows Desktop
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows Desktop App
        run: flutter build windows --release

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: netr-windows-app
          path: build/windows/x64/runner/Release/

  build-macos:
    name: Build macOS Desktop
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build macOS Desktop App
        run: flutter build macos --release

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: netr-macos-app
          path: build/macos/Build/Products/Release/
