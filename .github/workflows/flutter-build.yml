name: Build and Release Flutter Multi-Platform App

on:
  push:
    branches:
      - main
    paths:
      - 'pubspec.yaml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ubuntu:
    name: Build Android, Web, Linux
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pubspec-version.outputs.VERSION }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev mpv libmpv-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Extract Version from pubspec.yaml
        id: pubspec-version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d '[:space:]')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Web App
        run: flutter build web --release

      - name: Build Linux Desktop App
        run: flutter build linux --release

      - name: Compress Linux Bundle
        run: |
          cd build/linux/x64/release/
          tar -czf ../../../../netr-linux-x64.tar.gz bundle/
          cd ../../../..

      - name: Pack Web Build
        run: |
          cd build
          zip -r ../netr-web.zip web/
          cd ..

      - name: Upload Raw Linux Bundle for Packaging
        uses: actions/upload-artifact@v4
        with:
          name: raw-linux-bundle
          path: build/linux/x64/release/bundle/

      - name: Upload Main Base Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: base-linux-and-mobile-artifacts
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            netr-web.zip
            netr-linux-x64.tar.gz

  build-arch:
    name: Build Arch Linux Pacman Package
    needs: build-ubuntu
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Container Core Dependencies
        run: pacman -Syu --noconfirm --needed grep sed binutils

      - name: Get version from pubspec.yaml
        id: pubspec-version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d '[:space:]')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Raw Linux Bundle
        uses: actions/download-artifact@v4
        with:
          name: raw-linux-bundle
          path: build/linux/x64/release/bundle/

      - name: Generate Arch Linux PKGBUILD
        run: |
          VERSION="${{ steps.pubspec-version.outputs.VERSION }}"
          cat <<EOF > PKGBUILD
          pkgname=netr
          pkgver=${VERSION}
          pkgrel=1
          pkgdesc="CCTV camera monitor supporting intranet and remote SSH connections"
          arch=('x64')
          url="https://github.com"
          license=('GPL-3.0-only')
          depends=('gtk3' 'liblzma' 'mpv')
          source=()
          
          package() {
            install -dm755 "\${pkgdir}/opt/netr"
            cp -r "${GITHUB_WORKSPACE}/build/linux/x64/release/bundle/." "\${pkgdir}/opt/netr/"
            
            install -dm755 "\${pkgdir}/usr/bin"
            ln -s "/opt/netr/netr" "\${pkgdir}/usr/bin/netr"

            install -dm755 "\${pkgdir}/usr/share/applications"
            install -m644 "${GITHUB_WORKSPACE}/linux/netr.desktop" "\${pkgdir}/usr/share/applications/netr.desktop"

            install -dm755 "\${pkgdir}/usr/share/pixmaps"
            install -m644 "${GITHUB_WORKSPACE}/icons/netr.png" "\${pkgdir}/usr/share/pixmaps/netr.png"

            install -dm755 "\${pkgdir}/usr/share/licenses/\${pkgname}"
            install -m644 "${GITHUB_WORKSPACE}/LICENSE" "\${pkgdir}/usr/share/licenses/\${pkgname}/LICENSE"
          }
          EOF

      - name: Build Arch Linux Pacman Package
        uses: FFY00/build-arch-package@v1
        with:
          PKGBUILD: './PKGBUILD'

      - name: Prepare Arch Package
        run: mv *.pkg.tar.zst netr-linux-x64.pkg.tar.zst

      - name: Upload Arch Artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-artifact
          path: netr-linux-x64.pkg.tar.zst

  build-windows:
    name: Build Windows Desktop
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows Desktop App
        run: flutter build windows --release

      - name: Compress Windows Bundle
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath netr-windows-x64.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: netr-windows-x64.zip

  create-release:
    name: Publish Production GitHub Release
    needs: [build-ubuntu, build-arch, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get version from pubspec.yaml
        id: pubspec-version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d '[:space:]')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify Tag Status
        id: tag-check
        run: |
          TAG_NAME="v${{ steps.pubspec-version.outputs.VERSION }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG_NAME}$"; then
            echo "TAG_EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "TAG_EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Download All Production Artifacts
        if: steps.tag-check.outputs.TAG_EXISTS == 'false'
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Organize Files for Upload
        if: steps.tag-check.outputs.TAG_EXISTS == 'false'
        run: |
          mkdir ./release-assets
          cp artifacts/base-linux-and-mobile-artifacts/app-release.apk ./release-assets/netr-android.apk
          cp artifacts/base-linux-and-mobile-artifacts/netr-web.zip ./release-assets/
          cp artifacts/base-linux-and-mobile-artifacts/netr-linux-x64.tar.gz ./release-assets/
          cp artifacts/arch-artifact/netr-linux-x64.pkg.tar.zst ./release-assets/
          cp artifacts/windows-artifact/netr-windows-x64.zip ./release-assets/
          cp artifacts/macos-artifact/netr-macos-x64.zip ./release-assets/

      - name: Create GitHub Release and Upload Files
        if: steps.tag-check.outputs.TAG_EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.pubspec-version.outputs.VERSION }}
          name: Release v${{ steps.pubspec-version.outputs.VERSION }}
          body: |
            ## Automated Release
            Successfully compiled multi-platform builds for version ${{ steps.pubspec-version.outputs.VERSION }}.
          draft: false
          prerelease: false
          files: |
            release-assets/netr-android.apk
            release-assets/netr-web.zip
            release-assets/netr-linux-x64.tar.gz
            release-assets/netr-linux-x64.pkg.tar.zst
            release-assets/netr-windows-x64.zip
